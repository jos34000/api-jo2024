name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check_release.outputs.released }}
      version: ${{ steps.check_release.outputs.version }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/exec @semantic-release/github

      - name: Get version before release
        id: pre_version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: JO2024 Release Bot
          GIT_AUTHOR_EMAIL: noreply@jo2024-tickets.com
          GIT_COMMITTER_NAME: JO2024 Release Bot
          GIT_COMMITTER_EMAIL: noreply@jo2024-tickets.com
        run: npx semantic-release

      - name: Check if new release was published
        id: check_release
        run: |
          git pull origin master
          NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [ "$NEW_VERSION" != "${{ steps.pre_version.outputs.version }}" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  docker:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.outputs.released == 'true'

    steps:
      - uses: actions/checkout@v3
        with:
          ref: master

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-jo2024:${{ needs.release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/api-jo2024:latest